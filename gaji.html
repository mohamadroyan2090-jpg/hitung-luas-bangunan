<!DOCTYPE html>
<html>
<head>
    <title>Tugas 2 Data Pegawai</title>
</head>
<body>

<script>
    // Data Pegawai
    let nama = "Dodi Prayodi";
    let umur = 25;
    let jabatan = "Manajer";
    let status = "Menikah";

    // Gaji Pokok (if)
    let gapok;
    if (jabatan == "Manajer") {
        gapok = 15000000;
    } else if (jabatan == "Asisten Manajer") {
        gapok = 10000000;
    } else if (jabatan == "Staff") {
        gapok = 5000000;
    }

    // Tunjangan
    let tunjanganJabatan = 0.15 * gapok;
    let bpjs = 0.10 * gapok;

    // Tunjangan Keluarga (ternary)
    let tunjanganKeluarga = (status == "Menikah") ? 0.20 * gapok : 0;

    // Total Gaji
    let totalGaji = gapok + tunjanganJabatan + bpjs + tunjanganKeluarga;

    // Cetak tabel
    document.write("<table border='1' cellpadding='10'>");

    document.write("<thead>");
    document.write("<tr>");
    document.write("<th>Nama Pegawai</th>");
    document.write("<th>Umur</th>");
    document.write("<th>Jabatan</th>");
    document.write("<th>Status</th>");
    document.write("<th>Gaji Pokok</th>");
    document.write("<th>Tunjangan Jabatan</th>");
    document.write("<th>BPJS</th>");
    document.write("<th>Tunjangan Keluarga</th>");
    document.write("</tr>");
    document.write("</thead>");

    document.write("<tbody>");
    document.write("<tr>");
    document.write("<td>"+nama+"</td>");
    document.write("<td>"+umur+"</td>");
    document.write("<td>"+jabatan+"</td>");
    document.write("<td>"+status+"</td>");
    document.write("<td>"+gapok+"</td>");
    document.write("<td>"+tunjanganJabatan+"</td>");
    document.write("<td>"+bpjs+"</td>");
    document.write("<td>"+tunjanganKeluarga+"</td>");
    document.write("</tr>");
    document.write("</tbody>");

    document.write("<tfoot>");
    document.write("<tr>");
    document.write("<th colspan='7'>Total Gaji</th>");
    document.write("<th>"+totalGaji+"</th>");
    document.write("</tr>");
    document.write("</tfoot>");

    document.write("</table>");
</script>

</body>
</html>
