<!DOCTYPE html>
<html>
<head>
    <title>Tugas Pertemuan 3 JS</title>
</head>
<body>

<h2>Manajemen Produk Toko</h2>
<div id="output"></div>

<script>
let output = document.getElementById("output");

// Array produk
let produkToko = [
    {id: 1, nama: "Laptop", harga: 7000000, stok: 5},
    {id: 2, nama: "Mouse", harga: 200000, stok: 10},
    {id: 3, nama: "Keyboard", harga: 350000, stok: 7}
];

// Fungsi menampilkan produk
function tampilkanProduk() {
    let html = "<h3>Daftar Produk</h3>";
    html += "<ul>";
    
    for (let i = 0; i < produkToko.length; i++) {
        html += "<li>"
            + "ID: " + produkToko[i].id +
            " | Nama: " + produkToko[i].nama +
            " | Harga: " + produkToko[i].harga +
            " | Stok: " + produkToko[i].stok +
            "</li>";
    }
    
    html += "</ul>";
    output.innerHTML = html;
}

// Fungsi tambah produk
function tambahProduk(nama, harga, stok) {
    let idBaru = produkToko.length + 1;
    let produkBaru = {
        id: idBaru,
        nama: nama,
        harga: harga,
        stok: stok
    };

    produkToko.push(produkBaru);
}

// Fungsi hapus produk
function hapusProduk(id) {
    produkToko = produkToko.filter(produk => produk.id !== id);
}

// Contoh penggunaan
tambahProduk("Monitor", 1500000, 4);
hapusProduk(2); // hapus Mouse
tampilkanProduk();

</script>

</body>
</html>
